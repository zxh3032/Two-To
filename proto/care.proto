syntax = "proto3";

package twoto.care.v1;

import "common.proto";

option go_package = "github.com/zxh3032/two-to/services/api/proto;proto";

message CareReminderItem {
  // @inject_tag: json:"id"
  int64 id = 1;
  // @inject_tag: json:"petId"
  int64 pet_id = 2;
  // @inject_tag: json:"reminderType"
  string reminder_type = 3;
  // @inject_tag: json:"title"
  string title = 4;
  // @inject_tag: json:"description"
  string description = 5;
  // @inject_tag: json:"scheduledAt"
  int64 scheduled_at = 6;
  // @inject_tag: json:"completedAt"
  int64 completed_at = 7;
  // @inject_tag: json:"status"
  string status = 8;
}

message CareReminderCreateRequest {
  // @inject_tag: json:"item"
  CareReminderItem item = 1;
}

message CareReminderCreateResponse {
  // @inject_tag: json:"item"
  CareReminderItem item = 1;
}

message CareReminderListRequest {
  // @inject_tag: json:"petId"
  int64 pet_id = 1;
  // @inject_tag: json:"status"
  string status = 2;
  // @inject_tag: json:"page"
  twoto.common.v1.PageRequest page = 3;
}

message CareReminderListResponse {
  // @inject_tag: json:"page"
  twoto.common.v1.PageMeta page = 1;
  // @inject_tag: json:"data"
  repeated CareReminderItem data = 2;
}

message CareReminderCompleteRequest {
  // @inject_tag: json:"id"
  int64 id = 1;
  // @inject_tag: json:"petId"
  int64 pet_id = 2;
}

message CareReminderCompleteResponse {
  // @inject_tag: json:"item"
  CareReminderItem item = 1;
}
