syntax = "proto3";

package twoto.common.v1;

option go_package = "github.com/zxh3032/two-to/services/api/proto;proto";

message EmptyRequest {}

message EmptyResponse {}

message PageRequest {
  // @inject_tag: json:"pn"
  int32 pn = 1;
  // @inject_tag: json:"rn"
  int32 rn = 2;
}

message PageMeta {
  // @inject_tag: json:"total"
  int64 total = 1;
  // @inject_tag: json:"pn"
  int32 pn = 2;
  // @inject_tag: json:"rn"
  int32 rn = 3;
}
