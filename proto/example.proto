syntax = "proto3";

package twoto.example.v1;

option go_package = "github.com/zxh3032/two-to/services/api/proto;proto";

message ExamplePetItem {
  // @inject_tag: json:"id"
  int64 id = 1;
  // @inject_tag: json:"name"
  string name = 2;
  // @inject_tag: json:"petType"
  string pet_type = 3;
  // @inject_tag: json:"breedName"
  string breed_name = 4;
  // @inject_tag: json:"birthday"
  string birthday = 5;
}

message ExamplePetDetailRequest {
  // @inject_tag: json:"id"
  int64 id = 1;
  // @inject_tag: json:"userId"
  int64 user_id = 2;
}

message ExamplePetDetailResponse {
  // @inject_tag: json:"item"
  ExamplePetItem item = 1;
}
