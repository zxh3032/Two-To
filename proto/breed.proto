syntax = "proto3";

package twoto.breed.v1;

import "common.proto";

option go_package = "github.com/zxh3032/two-to/services/api/proto;proto";

message BreedItem {
  // @inject_tag: json:"id"
  int64 id = 1;
  // @inject_tag: json:"name"
  string name = 2;
  // @inject_tag: json:"petType"
  string pet_type = 3;
  // @inject_tag: json:"summary"
  string summary = 4;
  // @inject_tag: json:"temperament"
  string temperament = 5;
  // @inject_tag: json:"careLevel"
  string care_level = 6;
  // @inject_tag: json:"activityLevel"
  string activity_level = 7;
  // @inject_tag: json:"tags"
  repeated string tags = 8;
  // @inject_tag: json:"coverImage"
  string cover_image = 9;
}

message BreedListRequest {
  // @inject_tag: json:"petType"
  string pet_type = 1;
  // @inject_tag: json:"keyword"
  string keyword = 2;
  // @inject_tag: json:"tags"
  repeated string tags = 3;
  // @inject_tag: json:"page"
  twoto.common.v1.PageRequest page = 4;
}

message BreedListResponse {
  // @inject_tag: json:"page"
  twoto.common.v1.PageMeta page = 1;
  // @inject_tag: json:"data"
  repeated BreedItem data = 2;
}

message BreedDetailRequest {
  // @inject_tag: json:"id"
  int64 id = 1;
}

message BreedDetailResponse {
  // @inject_tag: json:"item"
  BreedItem item = 1;
}
